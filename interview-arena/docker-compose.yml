version: '3.8'

services:
  # ===== 后端 =====
  backend:
    build: ./backend
    container_name: interview-backend
    restart: always
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - ES_HOST=elasticsearch
      - MILVUS_HOST=milvus-standalone
      - MYSQL_PASSWORD=Arena@2026SecurePwd
      - REDIS_PASSWORD=Redis@2026Secure
      - RABBITMQ_PASSWORD=Mq@2026Secure
      - AI_DASHSCOPE_API_KEY=${AI_DASHSCOPE_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    networks:
      - interview-net
      - infra-net

  # ===== 前端 =====
  frontend:
    build: ./frontend
    container_name: interview-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - interview-net

  # ===== Nginx 反向代理 =====
  nginx:
    image: nginx:alpine
    container_name: interview-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - interview-net

networks:
  interview-net:
    driver: bridge
  infra-net:
    external: true
    name: backend-env_default
